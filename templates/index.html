<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKRPRO ULTIMATE</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background: #f2f2f7 url('https://w0.peakpx.com/wallpaper/241/552/HD-wallpaper-ios-16-original-abstract-white.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .iphone-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 45px;
            width: 340px;
            padding: 40px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { color: #1d1d1f; font-size: 26px; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 17px;
            margin-bottom: 15px;
            outline: none;
            color: #1d1d1f;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.02);
        }

        .btn-ios {
            width: 100%;
            background: #007aff;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
        }

        .btn-ios:active { transform: scale(0.95); opacity: 0.9; }
        .btn-ios:disabled { background: #8e8e93; cursor: wait; }

        #terminal {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.8);
            color: #30d158;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 11px;
            padding: 15px;
            border-radius: 20px;
            height: 120px;
            overflow-y: auto;
            text-align: left;
            line-height: 1.6;
        }

        .loading-text {
            display: none;
            margin-top: 15px;
            font-size: 14px;
            color: #007aff;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="iphone-glass">
    <h1>Room Spam</h1>
    
    <input type="text" id="uid" class="input-field" placeholder="Target UID">
    
    <select id="duration" class="input-field">
        <option value="5">Duration: 5s</option>
        <option value="10">Duration: 10s</option>
        <option value="30">Duration: 30s</option>
    </select>

    <button onclick="start()" id="mainBtn" class="btn-ios">Start Spam</button>
    
    <div id="loader" class="loading-text">⚙️ Waiting for API Response...</div>

    <div id="terminal">
        <span style="color: #98989d;">> CKRPRO Ultimate Ready.</span>
    </div>
</div>

<script>
    async function start() {
        const uid = document.getElementById('uid').value;
        const dur = document.getElementById('duration').value;
        const btn = document.getElementById('mainBtn');
        const term = document.getElementById('terminal');
        const loader = document.getElementById('loader');

        if (!uid) { alert("UID halnuhos!"); return; }

        btn.disabled = true;
        loader.style.display = 'block';
        term.innerHTML += `<br><span style="color: #ff9f0a;">[~] Request sent for UID: ${uid}</span>`;
        term.scrollTop = term.scrollHeight;

        try {
            // Jati time lage pani wait garna ko lagi timeout chaina yaha
            const res = await fetch('/send_spam', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: uid, duration: dur })
            });

            const data = await res.json();

            if (data.status === "success") {
                term.innerHTML += `<br><span style="color: #30d158;">[✓] Success: ${data.res}</span>`;
            } else {
                term.innerHTML += `<br><span style="color: #ff453a;">[!] API Msg: ${data.res}</span>`;
            }
        } catch (e) {
            term.innerHTML += `<br><span style="color: #ff453a;">[X] Connection Failed!</span>`;
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
            term.scrollTop = term.scrollHeight;
        }
    }
</script>

</body>
</html>
